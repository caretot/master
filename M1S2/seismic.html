<style>

    font-size: clamp(20px, 5vw, 32px);
    font-weight: 800;

    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;

  header p {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
  }

    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
    padding: 12px 20px;

    position: relative;
    max-width: 640px;
    margin: 0 auto 10px;

    position: absolute;
    left: 14px;
    top: 50%;

    color: var(--muted);
    font-size: 15px;
    pointer-events: none;

    font-size: 14px;

  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);

    gap: 8px;
    flex-wrap: wrap;
    max-width: 640px;
    margin: 0 auto;
    align-items: center;

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 12px;

    border-radius: 8px;
    padding: 5px 12px;

    margin: 0 auto;
    padding: 16px 16px 60px;
  }

    line-height: 1.75;
    color: #b8c4e0;
    padding-top: 12px;

  .q-answer strong {
    color: var(--accent);

  }

    .filter-row { gap: 5px; }

    .q-answer { font-size: 13px; }
  }
</style>

    }

    if (show) {
      card.classList.remove('hidden');
      visible++;
      // Highlight
      if (term) {
        [titleEl, answerEl].forEach(el => highlightText(el, term));
        card.classList.add('open');
      }
    } else {
      card.classList.add('hidden');
    }
  });

  // Hide empty sections
  document.querySelectorAll('.section').forEach(sec => {
    const hasVisible = [...sec.querySelectorAll('.q-card')].some(c => !c.classList.contains('hidden'));
    sec.style.display = hasVisible ? '' : 'none';
  });

  noResults.style.display = visible === 0 ? 'block' : 'none';
}

function highlightText(el, term) {
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
  const nodes = [];
  let node;
  while (node = walker.nextNode()) nodes.push(node);

  nodes.forEach(textNode => {
    const text = textNode.textContent;
    const lower = text.toLowerCase();
    const idx = lower.indexOf(term);
    if (idx === -1) return;

    const frag = document.createDocumentFragment();
    let last = 0;
    let i = idx;
    while (i !== -1) {
      frag.appendChild(document.createTextNode(text.substring(last, i)));
      const mark = document.createElement('mark');
      mark.textContent = text.substring(i, i + term.length);
      frag.appendChild(mark);
      last = i + term.length;
      i = lower.indexOf(term, last);
    }
    frag.appendChild(document.createTextNode(text.substring(last)));
    textNode.parentNode.replaceChild(frag, textNode);
  });
}

searchInput.addEventListener('input', applyFilters);

// ── FILTER BUTTONS ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilters();
  });
});

// ── EXPAND ALL ──
document.getElementById('expandAll').addEventListener('click', function() {
  allExpanded = !allExpanded;
  cardElements.forEach(card => {
    if (!card.classList.contains('hidden')) {
      if (allExpanded) card.classList.add('open');
      else card.classList.remove('open');
    }
  });
  this.textContent = allExpanded ? 'Collapse All' : 'Expand All';
});
</script>
